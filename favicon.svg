<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Diamond die favicon">
  <style>
    .die { fill: #000000; }
    .pip { fill: #ffffff; }

    @media (prefers-color-scheme: dark) {
      .die { fill: #ffffff; }
      .pip { fill: #000000; }
    }
  </style>

  <!-- Diamond body -->
  <g transform="rotate(45 32 32)">
    <rect x="13" y="13" width="38" height="38" rx="4" ry="4" class="die"/>
  </g>

  <!-- Pips -->
  <circle cx="22" cy="22" r="3.6" class="pip"/>
  <circle cx="42" cy="22" r="3.6" class="pip"/>
  <circle cx="32" cy="32" r="3.6" class="pip"/>
  <circle cx="22" cy="42" r="3.6" class="pip"/>
  <circle cx="42" cy="42" r="3.6" class="pip"/>
</svg>